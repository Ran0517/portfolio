<title>Rania El Bahri — Finance & Management Control</title>
<script>
  (function(){
    var lang = 'fr';
    try { var s = localStorage.getItem('lang'); if (s === 'en') lang = 'en'; } catch(e) {}
    if (lang === 'fr') {
      var b = (navigator.language || navigator.userLanguage || '').toLowerCase();
      if (b.startsWith('en')) lang = 'en';
    }
    document.documentElement.lang = lang;
    window.__initLang = lang;
  })();

  function toggleEpbm(btn) {
    var card   = btn.closest('.project-card');
    var drawer = card.querySelector('.epbm-drawer');
    var isOpen = drawer.classList.contains('open');
    document.querySelectorAll('.epbm-drawer.open').forEach(function(d) {
      d.classList.remove('open');
      var b = d.closest('.project-card').querySelector('.epbm-toggle');
      if (b) { b.classList.remove('open'); b.setAttribute('aria-expanded','false'); }
    });
    if (!isOpen) {
      drawer.classList.add('open');
      btn.classList.add('open');
      btn.setAttribute('aria-expanded','true');
    }
  }
</script>

<style>
  :root {
    --bg:        #F8F7F4;
    --navy:      #1B3557;
    --navy-light:#2A4A72;
    --gold:      #C9923B;
    --gold-accessible: #96611A;
    --gold-light:#E8B06A;
    --text:      #2D3748;
    --muted:     #6B7280;
    --border:    #E2DFD7;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  [data-lang] { transition: opacity 0.25s; }
  body.lang-fr [data-lang="en"],
  body.lang-en [data-lang="fr"] { display: none !important; }

  .lang-switch {
    display: flex; align-items: center; gap: 0;
    border: 1px solid var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0;
  }
  .lang-btn {
    padding: 6px 13px; font-size: 12px; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); background: transparent;
    border: none; cursor: pointer; transition: background 0.18s, color 0.18s;
    font-family: 'DM Sans', sans-serif;
  }
  .lang-btn.active { background: var(--navy); color: white; }
  .lang-btn:not(.active):hover { background: var(--border); color: var(--navy); }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(248,247,244,0.95); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5vw; height: 60px; gap: 24px;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600;
    color: var(--navy); letter-spacing: 0.04em; text-decoration: none; flex-shrink: 0;
  }
  .nav-right { display: flex; align-items: center; gap: 28px; list-style: none; }
  .nav-right a {
    font-size: 13px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); text-decoration: none; transition: color 0.2s; white-space: nowrap;
  }
  .nav-right a:hover { color: var(--navy); }
  .nav-cv-btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px;
    border: 1px solid var(--navy); color: var(--navy) !important; font-size: 12px !important;
    letter-spacing: 0.07em !important; font-weight: 500 !important; text-decoration: none;
    transition: background 0.2s, color 0.2s !important; white-space: nowrap;
  }
  .nav-cv-btn:hover { background: var(--navy); color: white !important; }

  .hero {
    min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; padding-top: 60px;
  }
  .hero-content {
    display: flex; flex-direction: column; justify-content: center; padding: 80px 6vw 80px 8vw;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold-accessible); margin-bottom: 28px;
  }
  .hero-tag::before { content: ''; display: block; width: 28px; height: 1px; background: var(--gold-accessible); }
  h1 {
    font-family: 'Cormorant Garamond', serif; font-size: clamp(40px, 5vw, 68px); font-weight: 600;
    color: var(--navy); line-height: 1.08; letter-spacing: -0.01em; margin-bottom: 24px;
  }
  .hero-golden {
    font-size: 16px; color: var(--text); max-width: 480px; line-height: 1.8; margin-bottom: 14px;
    border-left: 3px solid var(--gold); padding-left: 20px;
  }
  .hero-sub {
    font-size: 15px; font-weight: 300; color: var(--muted); max-width: 440px;
    line-height: 1.75; margin-bottom: 40px; padding-left: 23px;
  }
  .cta-group { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px;
    background: var(--navy); color: white; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; text-decoration: none; letter-spacing: 0.04em;
    border: none; cursor: pointer; transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: var(--navy-light); transform: translateY(-1px); }
  .btn-secondary {

    border: 1px solid var(--navy); transition: background 0.2s, color 0.2s;

  .hero-visual {
    background: var(--navy); display: flex; flex-direction: column; justify-content: center;
    align-items: center; padding: 80px 6vw; position: relative; overflow: hidden; gap: 36px;
  }
  .hero-visual::before {
    content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px;
    border: 60px solid rgba(201,146,59,0.1); border-radius: 50%; pointer-events: none;
  }
  .hero-visual::after {
    content: ''; position: absolute; bottom: -40px; left: -40px; width: 200px; height: 200px;
    border: 40px solid rgba(201,146,59,0.06); border-radius: 50%; pointer-events: none;
  }
  .hero-visual .diamond-pattern { position: absolute; bottom: 16px; right: 16px; z-index: 0; opacity: 0.07; pointer-events: none; }
  .photo-wrap { position: relative; z-index: 1; }
  .photo-frame {
    width: 136px; height: 136px; border-radius: 50%; border: 3px solid rgba(201,146,59,0.45);
    overflow: hidden; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center;
  }
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 2px; width: 100%; max-width: 320px; position: relative; z-index: 1;
  }
  .stat-card {
    background: rgba(255,255,255,0.05); padding: 24px 18px; text-align: center;
    border: 1px solid rgba(255,255,255,0.07); transition: background 0.2s;
  }
  .stat-card:hover { background: rgba(255,255,255,0.09); }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 600; color: var(--gold-light); line-height: 1; margin-bottom: 6px; }
  .stat-label { font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(255,255,255,0.4); line-height: 1.4; }

  section { padding: 100px 8vw; }
  .section-eyebrow {
    display: flex; align-items: center; gap: 12px; font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold-accessible); margin-bottom: 20px;
  }
  .section-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--border); max-width: 80px; }
  h2 {
    font-family: 'Cormorant Garamond', serif; font-size: clamp(30px, 3.8vw, 50px); font-weight: 600;
    color: var(--navy); line-height: 1.12; margin-bottom: 16px;
  }
  .section-intro { font-size: 17px; font-weight: 300; color: var(--muted); max-width: 580px; margin-bottom: 60px; line-height: 1.8; }
  .divider { width: 80px; height: 16px; margin: 32px 0; display: flex; align-items: center; gap: 8px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1.5px; background: var(--gold); opacity: 0.6; }

  .about-grid { display: grid; grid-template-columns: 5fr 4fr; gap: 80px; align-items: start; }
  .about-narrative p { font-size: 16px; color: var(--text); line-height: 1.85; margin-bottom: 20px; }
  .quote-block { border-left: 3px solid var(--gold); padding: 18px 0 18px 24px; margin: 28px 0; background: rgba(201,146,59,0.04); }
  .quote-block p { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; color: var(--navy); line-height: 1.45; margin-bottom: 0; }

  .dual-timeline { display: grid; grid-template-columns: 1fr 1fr; gap: 0 48px; margin-top: 40px; align-items: start; }
  .tl-edu .timeline-title { font-size: 14px; word-break: break-word; overflow-wrap: break-word; }
  .tl-col-label {
    font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 20px; display: flex; align-items: center; gap: 10px;
  }
  .tl-col-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .tl-col-label.exp { color: var(--gold-accessible); }
  .tl-col-label.edu { color: var(--navy); opacity: 0.5; }

  .timeline { position: relative; padding-left: 32px; }
  .timeline-item { position: relative; padding-bottom: 32px; }
  .timeline-item::after {
    content: ''; position: absolute; left: -20px; top: 15px; bottom: -32px;
    width: 1px; background: var(--border); z-index: 0;
  }
  .timeline-item:last-child::after { display: none; }
  .tl-edu .timeline-item::after {
    background: repeating-linear-gradient(to bottom, var(--border) 0, var(--border) 6px, transparent 6px, transparent 12px);
  }
  .timeline-item::before {
    content: ''; position: absolute; left: -25px; top: 5px; width: 10px; height: 10px;
    background: var(--gold); border-radius: 50%; border: 2px solid var(--bg); z-index: 1;
  }
  .tl-edu .timeline-item::before { background: var(--bg); border: 2px solid var(--navy); opacity: 0.7; }
  .timeline-item.featured::before {
    width: 16px; height: 16px; left: -28px; top: 3px; background: var(--gold); border: 3px solid var(--bg);
    box-shadow: 0 0 0 4px rgba(201,146,59,0.2), 0 0 0 8px rgba(201,146,59,0.07); z-index: 1;
  }
  .timeline-item.featured::after { top: 19px; }
  .timeline-date { font-size: 10px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .timeline-title { font-family: 'Cormorant Garamond', serif; font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 3px; line-height: 1.3; hyphens: auto; word-break: break-word; }
  .timeline-item.featured .timeline-title { font-size: 16px; }
  .timeline-org { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
  .tl-exp .timeline-item .timeline-org { color: var(--gold-accessible); }
  .tl-edu .timeline-item .timeline-org { color: var(--muted); }
  .timeline-desc { font-size: 13px; color: var(--muted); line-height: 1.65; }
  .timeline-item.featured .timeline-org { color: var(--gold-accessible); }

  .featured-badge {
    display: inline-block; margin-bottom: 6px; padding: 3px 10px;
    background: rgba(201,146,59,0.1); border: 1px solid rgba(201,146,59,0.3);
    font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--gold-accessible); white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
  }

  @media (max-width: 960px) { .dual-timeline { grid-template-columns: 1fr; gap: 40px; } }

  .skills-sidebar { position: sticky; top: 80px; display: flex; flex-direction: column; }
  .skills-group { padding: 22px 0; border-bottom: 1px solid var(--border); }
  .skills-group:first-child { padding-top: 0; }
  .skills-group-label { font-size: 10px; font-weight: 500; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .skill-tag {
    display: inline-block; padding: 5px 13px; border: 1px solid var(--border);
    font-size: 13px; color: var(--navy); background: white; transition: border-color 0.2s;
  }
  .skill-tag:hover { border-color: var(--navy); }
  .skill-tag.highlight { background: var(--navy); color: white; border-color: var(--navy); }
  .skill-tag.gold { color: var(--gold-accessible); border-color: rgba(201,146,59,0.35); }
  .lang-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .lang-item:last-child { border-bottom: none; }
  .lang-name { font-size: 13px; color: var(--navy); font-weight: 500; }
  .lang-level { font-size: 12px; color: var(--gold-accessible); font-weight: 500; letter-spacing: 0.04em; }

  #projets { background: var(--navy); }
  #projets h2 { color: white; }
  #projets .section-intro { color: rgba(255,255,255,0.48); max-width: 640px; }
  .project-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .project-card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
    padding: 40px 30px; transition: background 0.25s, transform 0.25s, box-shadow 0.25s, border-color 0.25s; cursor: default;
  }
  .project-card:hover {
    background: rgba(255,255,255,0.09); transform: translateY(-4px);
    border-color: rgba(201,146,59,0.35);
    box-shadow: 0 8px 24px rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .project-num { font-family: 'Cormorant Garamond', serif; font-size: 42px; font-weight: 600; color: rgba(201,146,59,0.25); line-height: 1; margin-bottom: 20px; }
  .project-title { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 600; color: white; margin-bottom: 5px; line-height: 1.25; }
  .project-org { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 22px; }
  .epbm { display: flex; flex-direction: column; }
  .epbm-item { padding: 14px 0; border-top: 1px solid rgba(255,255,255,0.07); }
  .epbm-drawer { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.28s ease, opacity 0.22s ease; }
  .epbm-drawer.open { max-height: 600px; opacity: 1; }
  .epbm-toggle {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 16px; padding: 8px 18px;
    background: transparent; border: 1px solid rgba(201,146,59,0.4); color: var(--gold-light);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer; transition: background 0.2s, border-color 0.2s;
  }
  .epbm-toggle:hover { background: rgba(201,146,59,0.1); border-color: rgba(201,146,59,0.7); }
  .epbm-toggle svg { transition: transform 0.3s ease; flex-shrink: 0; }
  .epbm-toggle.open svg { transform: rotate(180deg); }
  .epbm-toggle .lbl-open { display: inline; }
  .epbm-toggle .lbl-close { display: none; }
  .epbm-toggle.open .lbl-open { display: none; }
  .epbm-toggle.open .lbl-close { display: inline; }
  .kpi-badge {
    display: inline-block; margin: 10px 0 4px; padding: 6px 14px;
    background: rgba(201,146,59,0.12); border: 1px solid rgba(201,146,59,0.3);
    font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600;
    color: var(--gold-light); letter-spacing: 0.02em;
  }
  .epbm-label { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 5px; opacity: 0.7; }
  .epbm-text { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.65; }
  .epbm-text strong { color: rgba(255,255,255,0.88); font-weight: 500; }

  .contact-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: center; }
  .contact-left h2 { margin-bottom: 18px; }
  .contact-left p { font-size: 16px; color: var(--muted); line-height: 1.8; margin-bottom: 36px; max-width: 420px; }
  .contact-infos { display: flex; flex-direction: column; gap: 16px; }
  .contact-info-item { display: flex; align-items: flex-start; gap: 14px; }
  .contact-info-icon { width: 38px; height: 38px; background: white; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .contact-info-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .contact-info-value { font-size: 15px; color: var(--navy); font-weight: 500; text-decoration: none; transition: color 0.2s; }
  .contact-info-value:hover { color: var(--gold-accessible); }
  .contact-right { background: var(--navy); padding: 52px 44px; position: relative; overflow: hidden; }
  .contact-right::before {
    content: '"'; position: absolute; top: -20px; right: 28px;
    font-family: 'Cormorant Garamond', serif; font-size: 160px; color: rgba(201,146,59,0.09); line-height: 1; pointer-events: none;
  }
  .contact-right h3 { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: white; line-height: 1.3; margin-bottom: 14px; position: relative; z-index: 1; }
  .contact-right p { font-size: 15px; color: rgba(255,255,255,0.48); line-height: 1.8; margin-bottom: 28px; position: relative; z-index: 1; }
  .cta-final {
    display: inline-flex; align-items: center; gap: 10px; padding: 15px 30px;
    background: var(--gold); color: white; font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; text-decoration: none; letter-spacing: 0.04em;
    transition: background 0.2s, transform 0.15s; position: relative; z-index: 1;
  }
  .cta-final:hover { background: #b0822f; transform: translateY(-1px); }

  footer {
    background: var(--navy); padding: 26px 8vw; display: flex; align-items: center;
    justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.06);
  }
  footer span { font-size: 12px; color: rgba(255,255,255,0.28); }
  .footer-links { display: flex; gap: 22px; }
  .footer-links a { font-size: 12px; color: rgba(255,255,255,0.28); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--gold-light); }

  section[id], div[id="top"] { scroll-margin-top: 68px; }

  #back-to-top {
    position: fixed; bottom: 32px; right: 32px; z-index: 9999;
    width: 48px; height: 48px; background: var(--navy);
    border: 2px solid rgba(255,255,255,0.15); border-radius: 50%;

    opacity: 0; visibility: hidden;
    transition: opacity 0.3s, visibility 0.3s, background 0.25s, border-color 0.25s;
    box-shadow: 0 4px 20px rgba(27,53,87,0.4);
